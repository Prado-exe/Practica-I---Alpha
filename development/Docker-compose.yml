    networks:
      - dev-net

  # 1. Tu MinIO principal (Igual que antes)
  minio:
    image: minio/minio
    container_name: minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin_minio"
      MINIO_ROOT_PASSWORD: "password123"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - dev-net

  # 2. EL AUTOMATIZADOR (Crea el bucket privado y se apaga)
  minio-setup:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      - minio
    networks:
      - dev-net
    entrypoint: >
      /bin/sh -c "
      echo 'Esperando a que MinIO inicie...';
      sleep 5;
      
      echo 'Conectando a MinIO...';
      mc alias set myminio http://minio:9000 admin_minio password123;
      
      echo 'Creando bucket privado observatory-files...';
      mc mb myminio/observatory-files || true;
      
      echo 'Configuración terminada. El bucket es seguro y hermético.';
      exit 0;
      "

volumes:
  minio_data:
 

networks:
  dev-net:
    driver: bridge
